<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style/global/global.css" />
    <link rel="stylesheet" href="../style/dashboard/sidebar.css" />
    <link rel="stylesheet" href="../style/dashboard/empresa.css" />
    <link rel="icon" href="../assets/logoIcon.png" />
    <script src="../js/dashboard/empresa.js"></script>
    <script src="../js/dashboard/sidebar.js" defer></script>
    <title>Empresa</title>
  </head>

  <body>
    <div class="janela">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="logo">
          <a href="index.html">
            <img id="img-header" src="../assets/logoSemFundo.png" alt="Logo do site" />
          </a>
        </div>

        <nav class="menu-lateral">
          <a class="btn-nav-white" href="index.html">
            <img src="../assets/IconDashboard.svg" alt="" class="icon-nav" />
            <span>Dashboard</span>
          </a>

          <a class="btn-nav-white" href="planos.html">
            <img src="../assets/iconPlanejamento.svg" alt="" class="icon-nav" />
            <span>Planos</span>
          </a>

          <a class="btn-nav-white ativo" href="empresa.html">
            <img src="../assets/iconEmpresav.png" alt="" class="icon-nav" />
            <span>Empresa</span>
          </a>

          <a class="btn-nav-white" href="eventos.html">
            <img src="../assets/iconEventos.svg" alt="" class="icon-nav" />
            <span>Eventos</span>
          </a>

          <a class="btn-nav-white" href="perfil.html">
            <img src="../assets/iconPerfil.svg" alt="" class="icon-nav" />
            <span>Perfil</span>
          </a>

          <a class="btn-nav-white" href="funcionarios.html">
            <img src="../assets/iconGerenciarFuncionario.svg" alt="" class="icon-nav" />
            <span>Gerenciar Funcionários</span>
          </a>
        </nav>

        <footer class="sidebar-footer">
          <div class="user-container">
            <div class="user-text">
              <span class="user-name" id="sidebar_nome"> </span>
              <span class="user-email" id="sidebar_email"> </span>
            </div>
          </div>

          <button id="btn-logout" class="icon-logout" onclick="limparSessao()">
            <img src="../assets/iconSair.png" alt="Sair" />
          </button>
        </footer>
      </aside>

      <main class="conteudo">
        <div class="content">
          <div class="options" id="buttons">
            <button class="destaque" id="btnEmpresa" onclick="mostrarAba('formEmpresa')">
              <p>Dados da Empresa</p>
            </button>
            <button id="btnEndereco" onclick="mostrarAba('formEndereco')"><p>Endereço</p></button>
          </div>
          <div class="edit">
            <div id="formEmpresa">
              <h2 id="title">Dados da Empresa</h2>
              <div class="inp" id="inp">
                <div class="iptOpt">
                  <p>Razão Social</p>
                  <input type="text" id="iptRazaoSocial" disabled />
                </div>
                <div class="iptOpt">
                  <p>Nome Fantasia</p>
                  <input type="text" id="iptNomeFantasia" disabled />
                </div>
                <div class="iptOpt">
                  <p>CNPJ</p>
                  <input type="text" id="iptCnpj" disabled maxlength="14" />
                </div>
                <div class="iptOpt">
                  <p>E-mail responsável</p>
                  <input type="text" id="iptEmail" disabled />
                </div>
              </div>
            </div>
            <div id="formEndereco" style="display: none">
              <h2 id="title">Endereco</h2>
              <div class="inp" id="inp">
                <div class="iptOpt">
                  <p>CEP</p>
                  <input type="text" id="iptCep" disabled maxlength="8" />
                </div>
                <div class="iptOpt">
                  <p>Complemento</p>
                  <input type="text" id="iptComplemento" disabled />
                </div>
                <div class="iptOpt">
                  <p>Numero</p>
                  <input type="text" id="iptNumero" disabled maxlength="6" />
                </div>
              </div>
            </div>
            <button onclick="toggleEdicao(this)">Atualizar Dados</button>
            <p id="ultimaAtualizacao">Data da última atualização: 01/01/2026 às 14h 30min</p>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
