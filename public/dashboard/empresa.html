        <main class="conteudo">
    <div class="content">
      <div class="options" id="buttons">
        <button class="destaque" id="btnEmpresa" onclick="empresa()"><p>Dados da Empresa</p></button>
        <button id="btnEndereco" onclick="endereco()"><p>Endereço</p></button>
      </div>
      <div class="edit">
        <h2 id="title">Dados da Empresa</h2>
        <div class="inp" id="inp">
          <div class="iptOpt">
            <p>Razão Social</p>
            <input type="text" id="iptRazaoSocial" placeholder="Ex: PlusTourists LTDA">
          </div>
          <div class="iptOpt">
            <p>Nome Fantasia</p>
            <input type="text" id="iptNomeFantasia" placeholder="Ex: PlusTourists">
          </div>
          <div class="iptOpt">
            <p>CNPJ</p>
            <input type="text" id="iptCnpj" placeholder="00.000.000/0000-000" maxlength="14">
          </div>
         <div class="iptOpt">
            <p>E-mail responsável</p>
            <input type="text" id="iptEmail" placeholder="contato@empresa.com.br">
          </div>
        </div>
        <button>Atualizar</button>
        <p id="ultimaAtualizacao">Data da última atualização: 01/01/2026 às 14h 30min</p>
      </div>
    </div>
