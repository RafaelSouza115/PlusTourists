<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style/dashboard/sidebar.css" />
    <link rel="stylesheet" href="../style/dashboard/evento-modal.css" />
    <link rel="stylesheet" href="../style/dashboard/evento.css" />
    <link rel="icon" href="../assets/logoIcon.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <script src="../js/dashboard/sidebar.js" defer></script>
    <script src="../js/dashboard/evento-modal.js" defer></script>
    <title>Eventos</title>
  </head>

  <body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <a href="index.html">
          <img id="img-header" src="../assets/logoSemFundo.png" alt="Logo do site" />
        </a>
      </div>
      <nav class="menu-lateral">
        <a class="btn-nav-white" href="index.html">
          <img src="../assets/IconDashboard.svg" alt="" class="icon-nav" />
          <span>Dashboard</span>
        </a>
        <a class="btn-nav-white" href="planos.html">
          <img src="../assets/iconPlanejamento.svg" alt="" class="icon-nav" />
          <span>Planos</span>
        </a>
        <a class="btn-nav-white" href="empresa.html">
          <img src="../assets/iconEmpresa.svg" alt="" class="icon-nav" />
          <span>Empresa</span>
        </a>
        <a class="btn-nav-white ativo" href="eventos.html">
          <img src="../assets/IconEventosV.svg" alt="" class="icon-nav" />
          <span>Eventos</span>
        </a>
        <a class="btn-nav-white" href="perfil.html">
          <img src="../assets/iconPerfil.svg" alt="" class="icon-nav" />
          <span>Perfil</span>
        </a>
        <a class="btn-nav-white" href="gerenciamento-funcionarios/gerenciamento-funcionarios.html">
          <img src="../assets/iconGerenciarFuncionario.svg" alt="" class="icon-nav" />
          <span>Gerenciar Funcionários</span>
        </a>
      </nav>
      <footer class="sidebar-footer">
        <div class="user-container">
          <div class="user-text">
            <span class="user-name" id="sidebar_nome"></span>
            <span class="user-email" id="sidebar_email"></span>
          </div>
        </div>
        <button id="btn-logout" class="icon-logout" onclick="limparSessao()">
          <img src="../assets/iconSair.png" alt="Sair" />
        </button>
      </footer>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">
      <div class="header">
        <h1>Eventos</h1>
        <h3>Gerencie e visualize os eventos disponíveis</h3>
      </div>

      <div class="overview">
        <!-- Filtros -->
        <div class="eventos-filtros">
          <div class="filtro-wrapper">
            <select id="filtro-destino" class="filtro-select">
              <option value="">Selecione: Destino</option>
            </select>
          </div>
          <select id="filtro-classificacao" class="filtro-classificacao">
            <option value="">Selecione: Classificação etária</option>
          </select>
        </div>

        <!-- Grid de cards — injetado pelo JS -->
        <section class="eventos-carrossel-section">
          <button class="carrossel-btn" id="btn-anterior">&#8249;</button>
          <div class="eventos-cards-wrapper" id="eventos-cards-wrapper"></div>
          <button class="carrossel-btn" id="btn-proximo">&#8250;</button>
        </section>

        <!-- Paginação — injetada pelo JS -->
        <div class="paginacao" id="paginacao"></div>
      </div>
    </main>
  </body>
</html>
