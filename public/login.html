<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/siteInstitucional/login.css">
    <link rel="icon" href="assets/logoIcon.png">
    <script src="js/site-institucional/login.js"> </script>
    <title>Login | +Tourists</title>
</head>

<body>
    <main class="page-wrapper">
        <section class="card-container">
            <div class="card-left">
                <p class="card-subtitle">Bem-vindo à plataforma</p>
                <h1 class="card-title"><span class="plus">+</span>Tourists</h1>
                <p class="card-description">
                    Nossa plataforma transforma dados do turismo em insights
                    estratégicos para ajudar sua agência a identificar oportunidades,
                    planejar campanhas e atrair mais clientes.
                </p>
            </div>

            <div class="card-right">
                <h2 class="form-title">Faça seu Login</h2>

                <form class="empresa-form" id="formCadastroEmpresa">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="seuemail@exemplo.com.br" />
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input id="senha" name="senha" type="password" placeholder="Digite sua senha" />
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary">Cancelar</button>
                        <button type="button" onclick="autenticar()" class="btn btn-primary">Entrar</button>
                    </div>

                    <p class="form-footer-text">
                        <span>Não tem conta?</span>
                        <a href="cadastroFuncionario.html" class="link-funcionario">Cadastre-se</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

</body>
<script>
    function autenticar() {
        const ipt_email = document.getElementById("email").value;
        const ipt_senha = document.getElementById("senha").value;


        fetch("/funcionarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            }, body: JSON.stringify({
                 email: ipt_email,
                  senha: ipt_senha })
        }).then(function (res) {
            console.log("Validando cadastro...")

            if (res.ok) {
                console.log(res);

                res.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.ID_FUNCIONARIO = json.id_funcionario;
                    sessionStorage.NOME_FUNCIONARIO = json.nome;
                    sessionStorage.EMAIL_FUNCIONARIO = json.email;
                    sessionStorage.NIVEL_ACESSO = json.nivel_acesso;
                    sessionStorage.ID_EMPRESA = json.empresa_ligada;
                    window.location = "../dashboard/index.html";
                })
            } else {

                console.log("Houve um erro ao tentar realizar o login!");
                res.text().then(text => {
                    console.log(text);
                });
            }
        }).catch(function (erro) {
            console.log(erro);
            return
        })
        return;
    }

</script>
</html>
